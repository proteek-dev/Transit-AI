# All TransLink SEQ feed URLs — no authentication required

gtfs_static:
  seq: "https://gtfsrt.api.translink.com.au/GTFS/SEQ_GTFS.zip"

gtfs_realtime:
  trip_updates: "https://gtfsrt.api.translink.com.au/api/realtime/SEQ/TripUpdates"
  vehicle_positions: "https://gtfsrt.api.translink.com.au/api/realtime/SEQ/VehiclePositions"
  service_alerts: "https://gtfsrt.api.translink.com.au/api/realtime/SEQ/alerts"

# By mode (optional — use when you need mode-specific granularity).
# The combined feeds above already include bus/rail/ferry entities for
# TripUpdates and VehiclePositions — tram is the one mode missing from
# them, which is why trip_updates_tram / vehicle_positions_tram are the
# only per-mode entries actually polled by the archiver (see
# scripts/archive_gtfsrt.py TRAM_FEEDS). The rest are documented here for
# reference, confirmed to exist but not currently needed.
#
# Confirmed NOT to exist (tested 2026-07-20): a per-mode tram ServiceAlerts
# endpoint. "ServiceAlerts/Tram" and "alert/Tram" 400 with "not a valid
# entityType" (the real entityType name is "Alerts", matching the combined
# feed's lowercase "alerts" path). "Alerts/Tram" uses a valid entityType
# and "Tram" is accepted as a valid routeType (confirmed via the distinct
# "not a valid routeType" error for bogus values like "GCL"/"LightRail"),
# but still 404s with BlobNotFound — no alerts blob is published for tram.
# TransLink also has no per-mode ServiceAlerts for bus/rail/ferry either.
gtfs_realtime_by_mode:
  trip_updates_bus:        "https://gtfsrt.api.translink.com.au/api/realtime/SEQ/TripUpdates/Bus"
  trip_updates_rail:       "https://gtfsrt.api.translink.com.au/api/realtime/SEQ/TripUpdates/Rail"
  trip_updates_tram:       "https://gtfsrt.api.translink.com.au/api/realtime/SEQ/TripUpdates/Tram"
  trip_updates_ferry:      "https://gtfsrt.api.translink.com.au/api/realtime/SEQ/TripUpdates/Ferry"
  vehicle_positions_tram:  "https://gtfsrt.api.translink.com.au/api/realtime/SEQ/VehiclePositions/Tram"

performance_data_portal: "https://www.data.qld.gov.au/dataset/translink-monthly-performance-data"

fetch_interval_seconds: 300  # every 5 minutes — balances freshness vs GitHub repo size

performance_csvs:
  # High priority — on-time running, direct ML training signal
  citytrain_punctuality:
    url: "https://www.data.qld.gov.au/dataset/b33b4ed9-0db4-4c1b-8f85-664ca0d42a54/resource/d6b9ce31-dd07-4ea2-ac1a-848fa638cd90/download/city-train-punctuality-and-reliability.csv"
    filename: "citytrain-punctuality.csv"
    priority: high

  complaints:
    url: "https://www.data.qld.gov.au/dataset/b33b4ed9-0db4-4c1b-8f85-664ca0d42a54/resource/c4a1cf64-aca9-4447-96eb-55baf5bee31e/download/complaints.csv"
    filename: "complaints.csv"
    priority: medium

  customer_experience_overall:
    url: "https://www.data.qld.gov.au/dataset/b33b4ed9-0db4-4c1b-8f85-664ca0d42a54/resource/c1984b8b-3822-41b0-bf90-b18b4a930072/download/customer-experience-overall.csv"
    filename: "customer-experience-overall.csv"
    priority: medium

  customer_experience_train:
    url: "https://translink.com.au/sites/default/files/assets/resources/about-translink/reporting-and-publications/open-data/customer-experience-train.csv"
    filename: "customer-experience-train.csv"
    priority: medium

  customer_experience_tram:
    url: "https://www.data.qld.gov.au/dataset/b33b4ed9-0db4-4c1b-8f85-664ca0d42a54/resource/d85034af-eea9-47f6-8ab3-5dc297094ba7/download/customer-experience-tram.csv"
    filename: "customer-experience-tram.csv"
    priority: medium

  customer_experience_ferry:
    url: "https://www.data.qld.gov.au/dataset/b33b4ed9-0db4-4c1b-8f85-664ca0d42a54/resource/011c2079-c451-4276-85c9-e89b61a1d120/download/customer-experience-ferry.csv"
    filename: "customer-experience-ferry.csv"
    priority: low

  seq_bus_punctuality:
    url: "https://www.data.qld.gov.au/dataset/b33b4ed9-0db4-4c1b-8f85-664ca0d42a54/resource/e12aa967-e3ca-491f-9b70-60bbea3f296e/download/seq-bus-punctuality.csv"
    filename: "seq-bus-punctuality.csv"
    priority: high

  seq_tram_punctuality:
    url: "https://www.data.qld.gov.au/dataset/b33b4ed9-0db4-4c1b-8f85-664ca0d42a54/resource/549c7dde-ab85-45ba-8b56-ead8f2f31129/download/seq-tram-punctuality-and-reli.csv"
    filename: "seq-tram-punctuality-and-reli.csv"
    priority: high
